services:
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    restart: unless-stopped
    env_file: ../.env.production
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env.production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: price_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d price_tracker"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env.production
    extra_hosts:
      - "vpn.littlewell-app.work:host-gateway"
    environment:
      ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/price_tracker?sslmode=disable
      APP_URL: https://${APP_DOMAIN}
      CORS_ORIGIN: https://${APP_DOMAIN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      TELEGRAM_WEBHOOK_URL: https://${API_DOMAIN}/api/telegram/webhook
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-18080}:8080"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["worker"]
    env_file: ../.env.production
    extra_hosts:
      - "vpn.littlewell-app.work:host-gateway"
    environment:
      ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/price_tracker?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: https://${API_DOMAIN}
    restart: unless-stopped
    env_file: ../.env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      API_URL: http://backend:8080
      PUBLIC_API_URL: https://${API_DOMAIN}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/price_tracker?sslmode=disable
      BETTER_AUTH_URL: https://${APP_DOMAIN}
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-13000}:3000"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  pgdata:
  caddy_data:
  caddy_config:
